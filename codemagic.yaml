workflows:
  # ── Legacy Capacitor iOS build — manual only ─────────────────────────────────
  # Kept until Flutter replaces it in the App Store.
  # Triggered via Codemagic API by Claude when explicitly approved.
  # For Flutter iOS use the flutter-release workflow below.
  ios-release:
    name: Lalabuba iOS Capacitor — Manual Only
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events: []   # no automatic triggers — Claude triggers via API

    integrations:
      app_store_connect: Bonistock ASC

    environment:
      groups:
        - ios-signing
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6761691648"
      node: latest

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Sync Capacitor web assets
        script: npx cap sync ios

      - name: Set build number
        script: |
          cd ios/App
          # Offset by 100 so Codemagic builds (101, 102…) always exceed any
          # prior GitHub Actions build. agvtool bumps CFBundleVersion only.
          agvtool new-version -all $(($BUILD_NUMBER + 100))

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch or create signing certificate & provisioning profile
        script: |
          app-store-connect fetch-signing-files com.lalabuba.lalabuba \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @env:CM_CERTIFICATE_PRIVATE_KEY

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply signing profiles to Xcode project
        script: xcode-project use-profiles

      - name: Build & archive
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/Lalabuba.xcarchive" \
            -destination "generic/platform=iOS" \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            | xcpretty

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # ── Flutter iOS release — manual only ────────────────────────────────────────
  # Triggered via Codemagic API by Claude when a Flutter release is approved.
  # workflowId to use in API call: "flutter-release"
  flutter-release:
    name: Lalabuba Flutter iOS — TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events: []   # no automatic triggers — Claude triggers via API

    integrations:
      app_store_connect: Bonistock ASC

    environment:
      groups:
        - ios-signing
      vars:
        APP_STORE_APPLE_ID: "6761691648"
        FLUTTER_APP_DIR: "flutter_app"
      flutter: stable

    scripts:
      - name: Set build number in pubspec.yaml
        script: |
          cd $FLUTTER_APP_DIR
          # Flutter version format: major.minor.patch+buildNumber
          # CFBundleVersion MUST be strictly greater than the latest build already on
          # App Store Connect. A fixed BUILD_NUMBER+offset scheme broke when Codemagic's
          # build index reset (index 6 → 1006) and collided below an existing TestFlight
          # build (1067). Fetch the real latest from ASC and increment instead.
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "")
          if ! echo "$LATEST" | grep -qE '^[0-9]+$'; then LATEST=0; fi
          CODE=$((LATEST + 1))
          # Safety floor: never publish at/below the known-good baseline (1067).
          if [ "$CODE" -le 1067 ]; then CODE=1068; fi
          sed -i "s/^version: .*/version: ${CURRENT}+${CODE}/" pubspec.yaml
          echo "latest TestFlight build=${LATEST}; pubspec version → ${CURRENT}+${CODE}"

      - name: Get Flutter dependencies
        script: |
          cd $FLUTTER_APP_DIR
          flutter pub get

      - name: Run tests
        script: |
          cd $FLUTTER_APP_DIR
          flutter test

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch or create signing certificate & provisioning profile
        script: |
          app-store-connect fetch-signing-files com.lalabuba.lalabuba \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @env:CM_CERTIFICATE_PRIVATE_KEY

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply signing profiles to Xcode project
        script: |
          cd $FLUTTER_APP_DIR
          # Write the export-options plist to an explicit path that the build step
          # also references — the auto $CM_EXPORT_OPTIONS_PLIST var was coming through
          # empty, which made `flutter build ipa` fail ("property list does not exist").
          xcode-project use-profiles --export-options-plist "$CM_BUILD_DIR/export_options.plist"

      - name: Build Flutter IPA
        script: |
          cd $FLUTTER_APP_DIR
          # Capture full verbose output to a log file that is published as an artifact
          # (Codemagic's API does not expose step logs; artifacts ARE downloadable).
          # pipefail keeps the step failing on error while still writing the log.
          set -o pipefail
          flutter build ipa --release --verbose \
            --export-options-plist="$CM_BUILD_DIR/export_options.plist" 2>&1 | tee "$CM_BUILD_DIR/flutter_build_ipa.log"

    artifacts:
      - flutter_app/build/ios/ipa/*.ipa
      - $CM_BUILD_DIR/flutter_build_ipa.log
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
