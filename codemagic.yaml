workflows:
  ios-release:
    name: Lalabuba iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Bonistock ASC

    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6761691648"
      node: latest

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Sync Capacitor web assets
        script: npx cap sync ios

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch or create signing certificate & provisioning profile
        script: |
          app-store-connect fetch-signing-files com.lalabuba.lalabuba \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply signing profiles to Xcode project
        script: xcode-project use-profiles

      - name: Build & archive
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/Lalabuba.xcarchive" \
            -destination "generic/platform=iOS" \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            | xcpretty

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
