workflows:
  # ── Flutter iOS release — manual only ────────────────────────────────────────
  # Triggered via Codemagic API by Claude when a Flutter release is approved.
  # workflowId to use in API call: "flutter-release"
  flutter-release:
    name: Lalabuba Flutter iOS — TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events: []   # no automatic triggers — Claude triggers via API

    integrations:
      app_store_connect: Bonistock ASC

    working_directory: flutter_app

    environment:
      groups:
        - ios-signing
      vars:
        APP_STORE_APPLE_ID: "6761691648"
      flutter: stable

    scripts:
      - name: Compute CFBundleVersion (must exceed latest TestFlight)
        script: |
          # CFBundleVersion MUST be strictly greater than the latest build already on
          # App Store Connect. A fixed BUILD_NUMBER+offset scheme broke when Codemagic's
          # build index reset (index 6 → 1006) and collided below an existing TestFlight
          # build (1067). Fetch the real latest from ASC and increment. The value is
          # exported via $CM_ENV and passed EXPLICITLY to `flutter build ipa
          # --build-number` below, so it can never be silently dropped.
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "")
          if ! echo "$LATEST" | grep -qE '^[0-9]+$'; then LATEST=0; fi
          CODE=$((LATEST + 1))
          # Safety floor: never publish at/below the known-good baseline (1067).
          if [ "$CODE" -le 1067 ]; then CODE=1068; fi
          echo "BUILD_CODE=$CODE" >> $CM_ENV
          echo ">>> latest TestFlight build=${LATEST}; will build CFBundleVersion=${CODE}"

      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Run tests
        script: flutter test

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch or create signing certificate & provisioning profile
        script: |
          app-store-connect fetch-signing-files com.lalabuba.lalabuba \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @env:CM_CERTIFICATE_PRIVATE_KEY

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply signing profiles to Xcode project
        script: |
          # Write the export-options plist to an explicit path that the build step
          # also references — the auto $CM_EXPORT_OPTIONS_PLIST var was coming through
          # empty, which made `flutter build ipa` fail ("property list does not exist").
          xcode-project use-profiles --export-options-plist "$CM_BUILD_DIR/export_options.plist"

      - name: Build Flutter IPA
        script: |
          # Capture full verbose output to a log file that is published as an artifact
          # (Codemagic's API does not expose step logs; artifacts ARE downloadable).
          # pipefail keeps the step failing on error while still writing the log.
          set -o pipefail
          echo ">>> building IPA with CFBundleVersion (--build-number) = ${BUILD_CODE}"
          flutter build ipa --release --verbose \
            --build-number="${BUILD_CODE}" \
            --export-options-plist="$CM_BUILD_DIR/export_options.plist" 2>&1 | tee "$CM_BUILD_DIR/flutter_build_ipa.log"

      - name: Upload dSYMs to Firebase Crashlytics
        script: |
          UPLOAD_BIN="ios/Pods/FirebaseCrashlytics/upload-symbols"
          GSVC_PLIST="ios/Runner/GoogleService-Info.plist"
          DSYM_DIR="build/ios/archive/Runner.xcarchive/dSYMs"
          if [ ! -f "$UPLOAD_BIN" ]; then
            echo "upload-symbols not found at $UPLOAD_BIN — skipping dSYM upload"; exit 0
          fi
          if [ ! -d "$DSYM_DIR" ]; then
            echo "dSYM directory not found at $DSYM_DIR — skipping"; exit 0
          fi
          find "$DSYM_DIR" -name "*.dSYM" | while read dsym; do
            echo "Uploading: $dsym"
            "$UPLOAD_BIN" -gsp "$GSVC_PLIST" -p ios "$dsym"
          done

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/Runner.xcarchive/dSYMs/*.dSYM
      - $CM_BUILD_DIR/flutter_build_ipa.log
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
