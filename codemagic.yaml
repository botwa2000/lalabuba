workflows:
  ios-release:
    name: Lalabuba iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic  # ← name of your App Store Connect key in Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lalabuba.lalabuba
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "YOUR_APP_APPLE_ID"  # ← from App Store Connect → Your App → Apple ID (numeric)
      node: latest

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Sync Capacitor web assets
        script: npx cap sync ios

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build & archive
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/Lalabuba.xcarchive" \
            -destination "generic/platform=iOS" \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            | xcpretty

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false  # flip to true when ready for full release
