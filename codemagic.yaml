workflows:
  ios-release:
    name: Lalabuba iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Bonistock ASC

    environment:
      groups:
        - ios-signing
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6761691648"
      node: latest

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Sync Capacitor web assets
        script: npx cap sync ios

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch or create signing certificate & provisioning profile
        script: |
          app-store-connect fetch-signing-files com.lalabuba.lalabuba \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @env:CM_CERTIFICATE_PRIVATE_KEY

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply signing profiles to Xcode project
        script: xcode-project use-profiles

      - name: Build & archive
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/Lalabuba.xcarchive" \
            -destination "generic/platform=iOS" \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            | xcpretty

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # ─────────────────────────────────────────────────────────────────────────────
  android-release:
    name: Lalabuba Android — Google Play
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      groups:
        - android-signing      # CM_KEYSTORE, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
        - google-play          # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      vars:
        PACKAGE_NAME: "com.lalabuba.lalabuba"
      node: latest
      java: 17

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Sync Capacitor web assets
        script: npx cap sync android

      - name: Set Android SDK path
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Decode keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/lalabuba.keystore

      - name: Build Android App Bundle (AAB)
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/lalabuba.keystore \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
