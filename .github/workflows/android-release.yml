name: Android — Google Play

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/android-release.yml'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build-and-publish:
    name: Build AAB & publish to Play Store (internal track)
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node ────────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # ── Sync Capacitor web assets into android/ ──────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── Java 17 (required by Gradle / AGP) ──────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Decode keystore from GitHub secret ──────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.CM_KEYSTORE }}" | base64 --decode > /tmp/lalabuba-release.keystore

      # ── Build release AAB ────────────────────────────────────────────────
      - name: Build Android App Bundle (AAB)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/lalabuba-release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.CM_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.CM_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.CM_KEY_PASSWORD }}"

      # ── Upload AAB as build artifact (always) ───────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: lalabuba-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── Publish to Google Play internal track ────────────────────────────
      - name: Publish to Play Store (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_CREDENTIALS }}
          packageName: com.lalabuba.lalabuba
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
