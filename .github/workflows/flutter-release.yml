name: Flutter — Store Release (manual, Claude-triggered)
# NEVER runs automatically. Claude triggers this via the GitHub API
# after explicit user approval:
#   POST /repos/botwa2000/lalabuba/actions/workflows/flutter-release.yml/dispatches
#   { "ref": "main", "inputs": { "platform": "android", "track": "internal" } }
#
# For iOS: Claude separately triggers the Codemagic "flutter-release" workflow via
#   POST https://api.codemagic.io/builds
#   { "appId": "69d2bd72c09ad496ab57741d", "workflowId": "flutter-release", "branch": "main" }

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to release'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - both
          - ios
      track:
        description: 'Android Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  # ── Android ──────────────────────────────────────────────────────────────────
  android:
    if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
    name: Build & publish Flutter Android (${{ inputs.track }} track)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Run tests
        working-directory: flutter_app
        run: flutter test

      - name: Decode keystore
        run: |
          echo "${{ secrets.CM_KEYSTORE }}" | base64 --decode > /tmp/lalabuba-release.keystore

      - name: Create key.properties
        run: |
          cat > flutter_app/android/key.properties <<EOF
          storePassword=${{ secrets.CM_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.CM_KEY_PASSWORD }}
          keyAlias=${{ secrets.CM_KEY_ALIAS }}
          storeFile=/tmp/lalabuba-release.keystore
          EOF

      - name: Set build number in pubspec.yaml
        working-directory: flutter_app
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          # Offset by 1000 so the Flutter versionCode always exceeds the legacy
          # Capacitor Play releases (which used raw run numbers, up to ~60).
          CODE=$((1000 + GITHUB_RUN_NUMBER))
          sed -i "s/^version: .*/version: ${CURRENT}+${CODE}/" pubspec.yaml
          echo "pubspec version → ${CURRENT}+${CODE}"

      - name: Build release App Bundle (AAB)
        working-directory: flutter_app
        run: flutter build appbundle --release

      - name: Build signed release APK (sideload artifact)
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: lalabuba-flutter-release.aab
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lalabuba-flutter-release.apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Publish to Play Store (${{ inputs.track }} track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_CREDENTIALS }}
          packageName: com.lalabuba.lalabuba
          releaseFiles: flutter_app/build/app/outputs/bundle/release/app-release.aab
          tracks: ${{ inputs.track }}
          status: completed
          # Must be false for the internal track: internal-test releases are not
          # held for review, so Google rejects this param being set ("Changes are
          # sent for review automatically. The query parameter
          # changesNotSentForReview must not be set."). false → action omits it.
          changesNotSentForReview: false

  # ── iOS: trigger Codemagic flutter-release workflow ───────────────────────────
  ios-trigger:
    # Run for ios-only, or for 'both' once Android has succeeded.
    if: ${{ always() && (inputs.platform == 'ios' || (inputs.platform == 'both' && needs.android.result == 'success')) }}
    name: Trigger Codemagic Flutter iOS build
    runs-on: ubuntu-latest
    needs: android

    steps:
      - name: Verify Codemagic token is present
        env:
          CM_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
        run: |
          if [ -z "$CM_TOKEN" ]; then
            echo "::error::CODEMAGIC_API_TOKEN secret is empty/unset — set it in repo Settings → Secrets."
            exit 1
          fi
          echo "Codemagic token present (length: ${#CM_TOKEN})"

      - name: Trigger Codemagic flutter-release
        env:
          CM_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
        run: |
          resp=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-auth-token: $CM_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{
              "appId": "69d2bd72c09ad496ab57741d",
              "workflowId": "flutter-release",
              "branch": "main"
            }' \
            https://api.codemagic.io/builds)
          code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "HTTP $code"
          echo "$body"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Codemagic build trigger failed (HTTP $code)"
            exit 1
          fi
          echo "Codemagic flutter-release triggered successfully"
