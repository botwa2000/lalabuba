name: Flutter — CI Build (artifact only)
# Runs automatically on every push that touches flutter_app/.
# Builds a debug APK for sideload testing — never uploads to any store.
# Download the APK from the Actions tab → Artifacts after the run completes.
# Store releases are handled by flutter-release.yml (manual, Claude-triggered).

on:
  push:
    branches: [main, flutter-dev]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-ci.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter debug APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Verify no analysis errors
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: flutter_app
        run: flutter test

      - name: Build debug APK
        working-directory: flutter_app
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: lalabuba-flutter-debug.apk
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
