name: deploy-dev
# Auto-deploy the dev branch to dev.lalabuba.com on every push.
# Requires repo secrets: HETZNER_HOST, HETZNER_SSH_KEY (a private key whose public
# half is in the server's authorized_keys).
on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "root@${{ secrets.HETZNER_HOST }}" \
            "bash /opt/lalabuba-dev/scripts/remote-deploy.sh dev"
