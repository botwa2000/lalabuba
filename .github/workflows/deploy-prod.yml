name: deploy-prod
# Manual production deploy to lalabuba.com (main branch).
# Requires repo secrets: HETZNER_HOST, HETZNER_SSH_KEY.
# Add a protected GitHub Environment named "production" for required reviewers.
on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "root@${{ secrets.HETZNER_HOST }}" \
            "bash /opt/lalabuba/scripts/remote-deploy.sh prod"
