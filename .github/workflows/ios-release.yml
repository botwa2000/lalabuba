name: iOS — TestFlight (disabled — Codemagic handles iOS builds)

on:
  workflow_dispatch:  # manual trigger only — Codemagic is the active iOS pipeline
    paths:
      - 'public/**'
      - 'ios/**'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/ios-release.yml'
  workflow_dispatch:

jobs:
  build-and-upload:
    name: Build IPA & upload to TestFlight
    runs-on: macos-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node ─────────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # ── Sync Capacitor web assets into ios/ ──────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync ios

      # ── Bump build number to GitHub run number ───────────────────────────────
      # Uses agvtool (Apple Generic Versioning Tool, ships with Xcode).
      # This keeps the marketing version (CFBundleShortVersionString) intact
      # while auto-incrementing the build number (CFBundleVersion).
      - name: Set build number
        run: |
          cd ios/App
          agvtool new-version -all ${{ github.run_number }}

      # ── Install Apple Distribution certificate ───────────────────────────────
      # Secret: IOS_CERT_P12_BASE64  — base64 of your .p12 export
      # Secret: IOS_CERT_PASSWORD    — password you chose when exporting .p12
      #
      # To get the base64 string on your Mac:
      #   base64 -i YourCert.p12 | pbcopy
      - name: Install Apple certificate
        env:
          CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          CERT_PASSWORD:   ${{ secrets.IOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          security create-keychain -p "ci-pass" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "ci-pass" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign -A
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "ci-pass" "$KEYCHAIN"

      # ── Install App Store provisioning profile ───────────────────────────────
      # Secret: IOS_PROFILE_BASE64 — base64 of your .mobileprovision file
      #
      # To get the base64 string on your Mac:
      #   base64 -i YourProfile.mobileprovision | pbcopy
      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/lalabuba.mobileprovision

      # ── Install Fastlane ─────────────────────────────────────────────────────
      - name: Install Fastlane
        run: gem install fastlane --no-document

      # ── Build IPA + upload to TestFlight ─────────────────────────────────────
      # Secrets needed:
      #   ASC_KEY_ID      — App Store Connect API key ID (e.g. AB12CD34EF)
      #   ASC_ISSUER_ID   — App Store Connect issuer UUID
      #   ASC_PRIVATE_KEY — base64 of the .p8 API key file
      #   IOS_TEAM_ID     — your 10-char Apple Team ID (e.g. A1B2C3D4E5)
      #   IOS_PROFILE_NAME — exact name of the provisioning profile
      - name: Build & upload to TestFlight
        env:
          ASC_KEY_ID:       ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:    ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY:  ${{ secrets.ASC_PRIVATE_KEY }}
          IOS_TEAM_ID:      ${{ secrets.IOS_TEAM_ID }}
          IOS_PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
        run: |
          cd ios/App
          fastlane beta
