  <style>
    /* Contact-form specific styles */
    .contact-form { margin-top: 1.5rem; }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-weight: 700; font-size: 0.88rem; color: var(--lp-muted); margin-bottom: 5px; }
    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 11px 16px;
      border: 2px solid var(--lp-border);
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--lp-ink);
      background: var(--lp-surface);
      box-sizing: border-box;
      transition: border-color 0.15s;
      outline: none;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus { border-color: var(--lp-purple); }
    textarea { resize: vertical; min-height: 140px; }
    .char-count { font-size: 0.8rem; color: var(--lp-muted); text-align: right; margin-top: 3px; }
    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 34px;
      background: var(--lp-purple);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }
    .submit-btn:hover { opacity: 0.87; transform: translateY(-1px); }
    .submit-btn:active { opacity: 0.7; transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .turnstile-wrap { margin: 1rem 0; }
    .form-msg {
      margin-top: 1rem;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.92rem;
      display: none;
    }
    .form-msg.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; display: block; }
    .form-msg.error   { background: #fce4ec; color: #b71c1c; border: 1px solid #ef9a9a; display: block; }
    .direct-email { margin-top: 2rem; font-size: 0.9rem; color: var(--lp-muted); }
  </style>

<body>

<nav class="legal-nav">

<span class="nav-spacer"></span><button id="lp-theme-btn" aria-label="Toggle dark/light mode">🌙</button>
</nav>

<div class="legal-content">

<h1>Get in Touch</h1>
<p>Have a question, feedback, or just want to say hi? We'd love to hear from you!</p>

<form id="contact-form" class="contact-form" novalidate>

  <!-- Honeypot — invisible to real users, bots fill it automatically -->
  <input name="website" style="display:none" tabindex="-1" autocomplete="off" aria-hidden="true"/>

  <div class="form-group">
    <label for="cf-name">Your name</label>
    <input type="text" id="cf-name" name="name" placeholder="e.g. Alex" maxlength="100" required autocomplete="name"/>
  </div>

  <div class="form-group">
    <label for="cf-email">Your email</label>
    <input type="email" id="cf-email" name="email" placeholder="you@example.com" required autocomplete="email"/>
  </div>

  <div class="form-group">
    <label for="cf-message">Message</label>
    <textarea id="cf-message" name="message" maxlength="2000" placeholder="Tell us what's on your mind…" required></textarea>
    <div class="char-count" aria-live="polite"><span id="char-count">0</span> / 2000</div>
  </div>

  <!-- Cloudflare Turnstile -->
  <div class="turnstile-wrap">
    <div class="cf-turnstile"
         data-sitekey="0x4AAAAAAC1F8nOkL4VkmWEd"
         data-theme="light">
    </div>
  </div>

  <button type="submit" id="cf-submit" class="submit-btn">Send message ✉️</button>

  <div id="form-msg" class="form-msg" role="alert" aria-live="polite"></div>
</form>

<p class="direct-email">Or email us directly at <a href="mailto:info@lalabuba.com">info@lalabuba.com</a></p>

</div>

</footer>

<!-- Cloudflare Turnstile -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<script>
(function () {
  "use strict";

  var msgField  = document.getElementById("cf-message");
  var charCount = document.getElementById("char-count");
  if (msgField && charCount) {
    msgField.addEventListener("input", function () {
      charCount.textContent = msgField.value.length;
    });
  }

  var form      = document.getElementById("contact-form");
  var submitBtn = document.getElementById("cf-submit");
  var msgDiv    = document.getElementById("form-msg");

  function showMsg(text, type) {
    msgDiv.textContent = text;
    msgDiv.className = "form-msg " + type;
  }
  function hideMsg() {
    msgDiv.className = "form-msg";
    msgDiv.textContent = "";
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    hideMsg();

    var name    = document.getElementById("cf-name").value.trim();
    var email   = document.getElementById("cf-email").value.trim();
    var message = msgField.value.trim();
    var website = form.querySelector('[name="website"]').value;

    if (!name)    { showMsg("Please enter your name.", "error"); return; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showMsg("Please enter a valid email address.", "error"); return;
    }
    if (!message) { showMsg("Please write a message.", "error"); return; }

    var turnstileToken = "";
    if (window.turnstile) {
      try { turnstileToken = window.turnstile.getResponse() || ""; } catch (err) { /* */ }
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Sending…";

    fetch("/api/contact", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, email: email, message: message, website: website, turnstileToken: turnstileToken })
    })
    .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
    .then(function (result) {
      if (result.ok && result.data.ok) {
        showMsg("Message sent! We'll get back to you soon. 🎉", "success");
        form.reset();
        charCount.textContent = "0";
        if (window.turnstile) { try { window.turnstile.reset(); } catch (err) { /* */ } }
      } else {
        showMsg(result.data.error || "Something went wrong. Please try again.", "error");
      }
    })
    .catch(function () {
      showMsg("Network error — please check your connection and try again.", "error");
    })
    .finally(function () {
      submitBtn.disabled = false;
      submitBtn.textContent = "Send message ✉️";
    });
  });
})();
</script>

</body>
