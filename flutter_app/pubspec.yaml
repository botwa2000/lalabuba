name: lalabuba
description: Lalabuba — AI Coloring Pages for Kids
publish_to: 'none'

version: 1.0.3+1071

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^10.3.1

  # Sharing
  share_plus: ^13.1.0

  # QR codes
  qr_flutter: ^4.1.0

  # Fonts — Fredoka + Nunito are bundled under google_fonts/ and runtime
  # fetching is disabled in main.dart, so fonts load offline and work in
  # regions where fonts.gstatic.com is blocked (e.g. China / zh locale).
  google_fonts: ^8.1.0

  # Analytics + crash reporting
  posthog_flutter: ^4.0.0
  firebase_core: ^3.0.0
  firebase_crashlytics: ^4.0.0

  # Utils
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  package_info_plus: ^10.1.0
  cupertino_icons: ^1.0.9
  vector_math: ^2.1.4
  flutter_colorpicker: ^1.0.6
  gal: ^2.3.2
  showcaseview: ^5.0.2

  # Richness features (parity with web fx/narrate/voice/print-book):
  #  • flutter_tts   — narrate color/number labels + completion praise
  #  • speech_to_text — voice prompt input (🎤 on the home screen)
  #  • printing/pdf  — export the Journal as a printable coloring book
  flutter_tts: ^4.2.3
  speech_to_text: ^7.3.0
  printing: ^5.14.2
  pdf: ^3.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/i18n/
    - assets/data/
    - assets/config/
    - assets/icon/
    - google_fonts/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"
