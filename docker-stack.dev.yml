version: "3.8"

services:
  app:
    image: lalabuba:dev
    ports:
      - "3021:3000"
    environment:
      APP_ENV: dev
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      IMAGE_PROVIDER: huggingface
    secrets:
      - lalabuba_dev_DATABASE_URL
      - lalabuba_dev_HF_TOKEN
      - lalabuba_dev_TOGETHER_API_KEY
      - lalabuba_dev_NOVITA_API_KEY
      - lalabuba_dev_CF_ACCOUNT_ID
      - lalabuba_dev_CF_API_TOKEN
      - lalabuba_dev_BLOB_READ_WRITE_TOKEN
      - lalabuba_dev_TURNSTILE_SECRET_KEY
    deploy:
      replicas: 1
      update_config:
        order: stop-first   # avoids two tasks binding the published port 3021
        failure_action: rollback
        monitor: 60s
        delay: 5s
      rollback_config:
        order: stop-first
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

secrets:
  lalabuba_dev_DATABASE_URL: { external: true }
  lalabuba_dev_HF_TOKEN: { external: true }
  lalabuba_dev_TOGETHER_API_KEY: { external: true }
  lalabuba_dev_NOVITA_API_KEY: { external: true }
  lalabuba_dev_CF_ACCOUNT_ID: { external: true }
  lalabuba_dev_CF_API_TOKEN: { external: true }
  lalabuba_dev_BLOB_READ_WRITE_TOKEN: { external: true }
  lalabuba_dev_TURNSTILE_SECRET_KEY: { external: true }
